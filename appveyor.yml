# 1. Initialization: Fetch the R-AppVeyor helper script
init:
  ps: |
    $ErrorActionPreference = "Stop"
    Invoke-WebRequest http://raw.github.com/krlmlr/r-appveyor/master/scripts/appveyor-tool.ps1 -OutFile "..\appveyor-tool.ps1"
    Import-Module '..\appveyor-tool.ps1'

# 2. Installation: Use the Bootstrap command from the helper script
install:
  ps: Bootstrap

cache:
  - C:\RLibrary

environment:
  NOT_CRAN: true

image: Visual Studio 2019

# 3. CRITICAL: This line stops the MSBuild error
build: off

# 4. Testing: Run your R checks
test_script:
  - Rscript -e "install.packages('remotes'); remotes::install_deps(dependencies = TRUE)"
  - Rscript -e "devtools::check()"

on_failure:
  - 7z a failure.zip *.Rcheck\*
  - appveyor PushArtifact failure.zip

artifacts:
  - path: '*.Rcheck\**\*.log'
    name: Logs
  - path: '*.Rcheck\**\*.out'
    name: Logs
  - path: '*.Rcheck\**\*.fail'
    name: Logs
  - path: '*.Rcheck\**\*.Rout'
    name: Logs
  - path: '\*_*.tar.gz'
    name: Bits
  - path: '\*_*.zip'
    name: Bits
